<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personel Sistemi</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <header>
        <h1>Personel Sistemi</h1>
        <nav>
            <ul>
                <li><a href="#">Ana Sayfa</a></li>
                <li><a href="#">Personeller</a></li>
                <li><a href="#">Ayarlar</a></li>
                <li><a href="#">Çıkış</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="search">
            <input type="text" id="searchInput" placeholder="Ara...">
            <button id="searchButton">Ara</button>
        </section>
        <section id="filters">
            <label for="departmentFilter">Departman:</label>
            <select id="departmentFilter">
                <option value="tümü">Tümü</option>
                <option value="hr">İK</option>
                <option value="it">BT</option>
                <option value="sales">Satış</option>
            </select>
            <button id="filterButton">Filtrele</button>
        </section>
        <section id="personnelCards">
            <!-- Personel kartları buraya eklenecek -->
        </section>
    </main>
    <footer>
        <p>© 2026 Personel Sistemi</p>
    </footer>
</body>
</html>
